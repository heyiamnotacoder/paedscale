services:
  - type: web
    name: paedscale-backend
    # Plain Python runtime — the orchestrator runs in-process on the Anthropic
    # Messages API (no Node / Claude Code CLI). A Docker image is no longer required.
    runtime: python
    plan: starter
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      # Set in the Render dashboard (Environment tab) — never commit the key.
      - key: ANTHROPIC_API_KEY
        sync: false
      # Deployed frontend origin(s), comma-separated, e.g. https://paedscale.vercel.app
      - key: ALLOWED_ORIGINS
        sync: false
      # Optional: raises the openFDA / PubMed rate limits.
      - key: OPENFDA_API_KEY
        sync: false
      - key: NCBI_API_KEY
        sync: false
      # Orchestrator config (single in-process Sonnet agent loop).
      - key: PAEDSCALE_ORCH_MODEL
        value: claude-sonnet-5
      - key: PAEDSCALE_MAX_TURNS
        value: "8"
      - key: PAEDSCALE_GUIDELINE_AGENT
        value: "1"
      # Optional: route edge-case literature through an MCP server (JSON array).
      - key: PAEDSCALE_MCP_SERVERS
        sync: false
